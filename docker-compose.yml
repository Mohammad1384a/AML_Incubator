services:
  db:
    image: postgres:16-alpine
    container_name: aml-incubator-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aml_incubator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aml_incubator_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aml_incubator"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aml-incubator-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aml_incubator?schema=public
      JWT_SECRET: local-dev-super-secret
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    container_name: aml-incubator-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
      API_INTERNAL_BASE_URL: http://api:3001/api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  aml_incubator_postgres_data:
