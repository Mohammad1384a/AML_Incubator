version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: aml-incubator-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aml_incubator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aml_incubator_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aml_incubator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aml_incubator_postgres_data:
